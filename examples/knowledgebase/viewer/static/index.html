<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKE Knowledge Graph Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --border:    #2a2d3e;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --accent:    #7c3aed;
    --sidebar-w: 220px;
    --panel-w:   320px;
  }

  body {
    display: flex;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font: 13px/1.5 "Inter", "Segoe UI", system-ui, sans-serif;
  }

  /* ── Left sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  #sidebar h1 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 14px 8px;
  }

  #search-wrap {
    padding: 0 10px 10px;
  }

  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }

  #doc-list { list-style: none; }

  .doc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 12px;
    border-left: 3px solid transparent;
    transition: background 0.1s;
  }
  .doc-item:hover { background: rgba(255,255,255,.04); }
  .doc-item.active { background: rgba(255,255,255,.07); border-left-color: var(--accent); }

  .doc-swatch {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .doc-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-count { color: var(--muted); font-size: 11px; }

  .sidebar-section { padding: 12px 14px 4px; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }

  #layout-select {
    margin: 4px 10px 10px;
    width: calc(100% - 20px);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 5px 8px;
    cursor: pointer;
    outline: none;
  }

  #meta-box {
    margin: 8px 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
  }
  #meta-box span { color: var(--text); font-weight: 600; }

  #legend { padding: 6px 14px 14px; font-size: 11px; color: var(--muted); }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .legend-swatch { width: 14px; height: 14px; flex-shrink: 0; display: inline-block; }
  .legend-diamond {
    width: 12px; height: 12px;
    background: #f59e0b;
    transform: rotate(45deg);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Graph canvas ── */
  #graph-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #cy {
    width: 100%;
    height: 100%;
    background: var(--bg);
  }

  #toolbar {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
  }

  .tb-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    width: 34px; height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .tb-btn:hover { background: rgba(255,255,255,.07); }

  #search-hits {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--muted);
    display: none;
  }

  /* ── Right detail panel ── */
  #detail {
    width: var(--panel-w);
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(100%);
    transition: transform 0.2s ease;
  }
  #detail.open { transform: translateX(0); }

  #detail-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  #detail-colour {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 3px;
  }

  #detail-title {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
  }

  #detail-close {
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
    border: none;
    background: none;
    color: var(--muted);
    padding: 0 2px;
  }
  #detail-close:hover { color: var(--text); }

  #detail-meta {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
  }
  #detail-meta span { color: var(--text); }

  #detail-elements {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
  }

  .el-item {
    padding: 8px 16px;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }

  .el-type {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(124,58,237,.25);
    color: #a78bfa;
    margin-bottom: 4px;
  }

  .el-type.paragraph { background: rgba(8,145,178,.2); color: #67e8f9; }
  .el-type.table     { background: rgba(22,163,74,.2);  color: #86efac; }
  .el-type.list      { background: rgba(234,88,12,.2);  color: #fdba74; }
  .el-type.figure    { background: rgba(225,29,72,.2);  color: #fda4af; }

  .el-text {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .el-path {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  #detail-empty {
    padding: 40px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }

  #loading {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--muted);
    z-index: 10;
  }
</style>
</head>
<body>

<!-- Left sidebar -->
<aside id="sidebar">
  <h1>AKE Viewer</h1>

  <div id="search-wrap">
    <input id="search" type="search" placeholder="Search nodes…" autocomplete="off">
  </div>

  <div class="sidebar-section">Documents</div>
  <ul id="doc-list"></ul>

  <div class="sidebar-section">Layout</div>
  <select id="layout-select">
    <option value="dagre-tb">Hierarchy (top → bottom)</option>
    <option value="dagre-lr">Hierarchy (left → right)</option>
    <option value="breadthfirst">Breadth-first</option>
    <option value="cose">Force-directed</option>
  </select>

  <div class="sidebar-section">Stats</div>
  <div id="meta-box">
    <div>Documents <span id="m-docs">—</span></div>
    <div>Sections <span id="m-sections">—</span></div>
    <div>Elements <span id="m-elements">—</span></div>
    <div>Shared systems <span id="m-systems">—</span></div>
  </div>

  <div class="sidebar-section">Legend</div>
  <div id="legend">
    <div class="legend-row"><span class="legend-swatch" style="background:#475569;border-radius:3px"></span> Document</div>
    <div class="legend-row"><span class="legend-swatch" style="background:#1a1d27;border:2px solid #7c3aed;border-radius:3px"></span> Section</div>
    <div class="legend-row"><span class="legend-swatch legend-diamond"></span> Shared system</div>
  </div>
</aside>

<!-- Graph canvas -->
<div id="graph-wrap">
  <div id="loading">Loading graph…</div>
  <div id="cy"></div>
  <div id="toolbar">
    <button class="tb-btn" id="btn-fit" title="Fit to screen">⊡</button>
    <button class="tb-btn" id="btn-expand" title="Expand all">+</button>
  </div>
  <div id="search-hits"></div>
</div>

<!-- Right detail panel -->
<aside id="detail">
  <div id="detail-header">
    <div id="detail-colour"></div>
    <div id="detail-title">—</div>
    <button id="detail-close">✕</button>
  </div>
  <div id="detail-meta"></div>
  <div id="detail-elements">
    <div id="detail-empty">Select a node to explore its elements.</div>
  </div>
</aside>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let cy = null;
let graphData = null;
let activeDocId = null;   // sidebar filter
let searchQuery = '';

// ── Helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function typeClass(t) {
  return ['paragraph','table','list','figure'].includes(t) ? t : '';
}

// ── Cytoscape stylesheet ───────────────────────────────────────────────────
const CY_STYLE = [
  {
    selector: 'node',
    style: {
      'label': 'data(label)',
      'font-size': 11,
      'font-family': '"Inter","Segoe UI",system-ui,sans-serif',
      'color': '#e2e8f0',
      'text-valign': 'center',
      'text-halign': 'center',
      'text-wrap': 'wrap',
      'text-max-width': 140,
      'width': 'label',
      'height': 'label',
      'padding': 10,
      'border-width': 2,
      'border-color': 'data(colour)',
      'background-color': '#1a1d27',
    }
  },
  {
    selector: 'node[type = "document"]',
    style: {
      'shape': 'round-rectangle',
      'background-color': 'data(colour)',
      'border-width': 0,
      'color': '#fff',
      'font-weight': 700,
      'font-size': 12,
    }
  },
  {
    selector: 'node[type = "section"][depth = 0]',
    style: { 'shape': 'round-rectangle', 'font-weight': 600 }
  },
  {
    selector: 'node[type = "section"][depth = 1]',
    style: { 'shape': 'round-rectangle', 'font-size': 10 }
  },
  {
    selector: 'node[type = "section"][depth >= 2]',
    style: { 'shape': 'ellipse', 'font-size': 10 }
  },
  {
    selector: 'node[type = "system"]',
    style: {
      'shape': 'diamond',
      'background-color': 'data(colour)',
      'border-width': 0,
      'color': '#fff',
      'font-weight': 700,
      'font-size': 11,
      'width': 100,
      'height': 60,
      'text-valign': 'center',
      'text-halign': 'center',
      'text-wrap': 'wrap',
      'text-max-width': 80,
    }
  },
  {
    selector: 'edge',
    style: {
      'width': 1.5,
      'line-color': 'data(colour)',
      'target-arrow-color': 'data(colour)',
      'target-arrow-shape': 'triangle',
      'curve-style': 'bezier',
      'opacity': 0.5,
    }
  },
  {
    selector: 'edge[edge_type = "system-ref"]',
    style: {
      'width': 1,
      'line-style': 'dashed',
      'line-dash-pattern': [6, 4],
      'opacity': 0.6,
      'target-arrow-shape': 'chevron',
    }
  },
  {
    selector: '.faded',
    style: { 'opacity': 0.15 }
  },
  {
    selector: '.highlighted',
    style: { 'opacity': 1, 'border-width': 3 }
  },
  {
    selector: '.search-match',
    style: {
      'border-width': 3,
      'border-color': '#facc15',
      'opacity': 1,
    }
  },
];

// ── Layouts ────────────────────────────────────────────────────────────────
function layoutOptions(name) {
  if (name === 'dagre-tb') return { name: 'dagre', rankDir: 'TB', nodeSep: 40, rankSep: 60, padding: 40, animate: true, animationDuration: 300 };
  if (name === 'dagre-lr') return { name: 'dagre', rankDir: 'LR', nodeSep: 30, rankSep: 80, padding: 40, animate: true, animationDuration: 300 };
  if (name === 'breadthfirst') return { name: 'breadthfirst', directed: true, padding: 40, spacingFactor: 1.3, animate: true, animationDuration: 300 };
  return { name: 'cose', padding: 40, animate: true, animationDuration: 500, idealEdgeLength: 120 };
}

function runLayout(name) {
  if (!cy) return;
  cy.layout(layoutOptions(name)).run();
}

// ── Sidebar: document list ─────────────────────────────────────────────────
async function loadDocList() {
  const res = await fetch('/api/documents');
  const { documents } = await res.json();
  const ul = $('doc-list');
  ul.innerHTML = '';

  // "All" entry
  const allLi = document.createElement('li');
  allLi.className = 'doc-item active';
  allLi.innerHTML = `<div class="doc-swatch" style="background:#475569"></div><span class="doc-label">All documents</span>`;
  allLi.addEventListener('click', () => filterByDoc(null, allLi));
  ul.appendChild(allLi);

  for (const doc of documents) {
    const li = document.createElement('li');
    li.className = 'doc-item';
    li.dataset.docId = doc.doc_id;
    li.innerHTML = `
      <div class="doc-swatch"></div>
      <span class="doc-label">${doc.label}</span>
      <span class="doc-count">${doc.element_count}</span>
    `;
    ul.appendChild(li);
  }
}

function applyDocColours(graphData) {
  const colourMap = {};
  for (const n of graphData.nodes) {
    if (n.data.type === 'document') colourMap[n.data.doc_id] = n.data.colour;
  }
  const items = document.querySelectorAll('#doc-list .doc-item[data-doc-id]');
  items.forEach(li => {
    const c = colourMap[li.dataset.docId] || '#475569';
    li.querySelector('.doc-swatch').style.background = c;
    li.addEventListener('click', () => filterByDoc(li.dataset.docId, li));
  });
}

function filterByDoc(docId, clickedLi) {
  activeDocId = docId;
  document.querySelectorAll('#doc-list .doc-item').forEach(li => li.classList.remove('active'));
  clickedLi.classList.add('active');

  if (!cy) return;
  if (!docId) {
    cy.elements().removeClass('faded').addClass('highlighted');
    return;
  }
  cy.elements().addClass('faded');
  cy.elements(`[doc_id = "${docId}"]`).removeClass('faded').addClass('highlighted');
  cy.edges().removeClass('faded');
  cy.edges(`[doc_id = "${docId}"]`).addClass('highlighted');
}

// ── Meta box ───────────────────────────────────────────────────────────────
function updateMeta(meta) {
  $('m-docs').textContent = meta.documents;
  $('m-sections').textContent = meta.sections;
  $('m-elements').textContent = meta.total_elements;
  $('m-systems').textContent = meta.shared_systems ?? 0;
}

// ── Detail panel ───────────────────────────────────────────────────────────
function openDetail(node) {
  const d = node.data();
  $('detail-colour').style.background = d.colour;
  $('detail-title').textContent = d.label;
  $('detail').classList.add('open');

  let meta = '';
  if (d.type === 'document') {
    meta += `<div>Type <span>document</span></div>`;
    meta += `<div>Elements <span>${d.element_count}</span></div>`;
    if (d.type_counts) {
      for (const [t, n] of Object.entries(d.type_counts)) {
        meta += `<div>${t} <span>${n}</span></div>`;
      }
    }
    meta += `<div style="margin-top:6px;word-break:break-all;font-size:10px">${d.source_url}</div>`;
  } else if (d.type === 'system') {
    meta += `<div>Type <span>shared system</span></div>`;
    meta += `<div>Referenced by <span>${d.reference_count} section${d.reference_count !== 1 ? 's' : ''}</span></div>`;
    const refs = node.connectedEdges(`[edge_type = "system-ref"]`).sources();
    if (refs.length) {
      meta += `<div style="margin-top:8px;font-size:10px;color:#94a3b8">Sections referencing this system:</div>`;
      refs.forEach(src => {
        const sd = src.data();
        meta += `<div style="font-size:10px;padding:2px 0">${escHtml(sd.label)}</div>`;
      });
    }
  } else {
    const depthLabel = ['h1','h2','h3','h4'][d.depth] || `h${d.depth+1}`;
    meta += `<div>Type <span>section (${depthLabel})</span></div>`;
    meta += `<div>Elements <span>${d.element_count}</span></div>`;
    if (d.type_counts) {
      for (const [t, n] of Object.entries(d.type_counts)) {
        meta += `<div>${t} <span>${n}</span></div>`;
      }
    }
    if (d.systems && d.systems.length) {
      meta += `<div style="margin-top:6px;font-size:10px;color:#94a3b8">Systems: <span style="color:#e2e8f0">${d.systems.join(', ')}</span></div>`;
    }
    if (d.section_path && d.section_path.length > 1) {
      meta += `<div style="margin-top:4px;font-size:10px">${d.section_path.join(' › ')}</div>`;
    }
  }
  $('detail-meta').innerHTML = meta;

  if (d.type === 'system') {
    $('detail-elements').innerHTML = '<div style="padding:20px 16px;color:#64748b;font-size:12px;text-align:center">System node — select a connected section to browse its elements.</div>';
    return;
  }
  loadElements(d.doc_id, d.section_path || []);
}

function closeDetail() {
  $('detail').classList.remove('open');
}

async function loadElements(docId, sectionPath) {
  const elBox = $('detail-elements');
  elBox.innerHTML = '<div id="detail-empty" style="padding:20px 16px;color:#64748b;font-size:12px">Loading…</div>';

  const params = new URLSearchParams({ doc_id: docId, section_path: JSON.stringify(sectionPath) });
  const res = await fetch(`/api/elements?${params}`);
  const { elements, count } = await res.json();

  if (!count) {
    elBox.innerHTML = '<div id="detail-empty" style="padding:20px 16px;color:#64748b;font-size:12px;text-align:center">No elements in this scope.</div>';
    return;
  }

  elBox.innerHTML = elements.map(el => {
    const pathStr = el.section_path.length > 1 ? el.section_path.slice(1).join(' › ') : '';
    return `
      <div class="el-item">
        <span class="el-type ${typeClass(el.type)}">${el.type}</span>
        <div class="el-text">${escHtml(el.text)}</div>
        ${pathStr ? `<div class="el-path">${escHtml(pathStr)}</div>` : ''}
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Search ─────────────────────────────────────────────────────────────────
let searchTimeout = null;

function applySearch(q) {
  if (!cy) return;
  cy.elements().removeClass('search-match').removeClass('faded');

  if (!q) {
    $('search-hits').style.display = 'none';
    return;
  }

  const lower = q.toLowerCase();
  const matches = cy.nodes().filter(n => n.data('label').toLowerCase().includes(lower));
  const nonMatches = cy.nodes().not(matches);

  cy.elements().addClass('faded');
  matches.removeClass('faded').addClass('search-match');
  matches.connectedEdges().removeClass('faded');

  const hitsEl = $('search-hits');
  hitsEl.style.display = 'block';
  hitsEl.textContent = `${matches.length} match${matches.length !== 1 ? 'es' : ''}`;

  if (matches.length > 0 && matches.length <= 20) {
    cy.animate({ fit: { eles: matches, padding: 60 }, duration: 300 });
  }
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function init() {
  await loadDocList();

  const res = await fetch('/api/graph');
  graphData = await res.json();

  updateMeta(graphData.meta);
  applyDocColours(graphData);

  // Build cytoscape elements array
  const elements = [
    ...graphData.nodes.map(n => ({ data: n.data })),
    ...graphData.edges.map(e => ({ data: e.data })),
  ];

  cy = cytoscape({
    container: $('cy'),
    elements,
    style: CY_STYLE,
    layout: layoutOptions('dagre-tb'),
    minZoom: 0.05,
    maxZoom: 3,
    wheelSensitivity: 0.3,
  });

  $('loading').style.display = 'none';

  // Node click → detail panel
  cy.on('tap', 'node', evt => {
    cy.elements().removeClass('highlighted');
    evt.target.addClass('highlighted');
    openDetail(evt.target);
  });

  // Background tap → close
  cy.on('tap', evt => {
    if (evt.target === cy) {
      closeDetail();
      cy.elements().removeClass('highlighted');
    }
  });

  // Toolbar
  $('btn-fit').addEventListener('click', () => cy.animate({ fit: { padding: 40 }, duration: 300 }));
  $('btn-expand').addEventListener('click', () => {
    runLayout($('layout-select').value);
  });

  // Layout selector
  $('layout-select').addEventListener('change', e => runLayout(e.target.value));

  // Detail close
  $('detail-close').addEventListener('click', closeDetail);

  // Search
  $('search').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchQuery = e.target.value.trim();
    searchTimeout = setTimeout(() => applySearch(searchQuery), 200);
  });
}

init().catch(err => {
  $('loading').textContent = `Error: ${err.message}`;
});
</script>
</body>
</html>
